{% extends "global/base.html" %}

{% block content %}
    <main>
        <h1>Novo Post</h1>
        <form action="{{ form_action }}" method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <div>
                <div class="form-group">
                    <button class="btn" type="submit">Enviar</button>
                </div>
            </div>
        </form>
    </main>
{% endblock content %}
